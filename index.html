const TOTAL = 26;

// ═══════════════════════════════════════════════════════════════
// PAGE 02 — The Problem
// ═══════════════════════════════════════════════════════════════
function P_Problem() {
  const problems = [
    ['Low awareness',`Citizens don't know which digital services exist or where to find them. The Deputy Minister himself stated: "There is no central place for citizens to access them." `, 'biometricupdate.com, October 2025', 'https://www.biometricupdate.com/?s=Sri+Lanka+government+super+app'],
    ['No direct citizen app',`GovPay requires opening a banking app first, finding GovPay inside it, then navigating. No standalone government app exists.`],
    ['Institution-first navigation',`Must know "Sri Lanka Police" to pay a traffic fine. Citizens don't think in departments — they think in tasks.`],
    ['No receipts or confirmation',`Payment confirmation lives in the banking app, not on the government platform. Citizens have no proof of payment in one accessible place.`],
    ['English-only UX',`Most government platforms are English-first. Large portions of the population are more comfortable in Sinhala or Tamil.`],
    ['Weak trust signals',`Citizens don't know if the platform is official, if their money is protected, or what to do if something goes wrong.`],
  ];
  return (
    <PubFinalPage title="The Problem" subtitle="Why Lanka Seva needs to exist" page={2} total={TOTAL}>
      <div className="pub-card outline" style={{ background:'#fff8ed', borderColor:'#d97706', marginBottom: 16 }}>
        <span className="label">Problem statement</span>
        <p style={{ fontSize: 16, lineHeight: 1.45 }}>
          Sri Lankan citizens are forced to navigate dozens of disconnected government websites,
          mobile apps, and physical offices to access everyday services — each with different login
          systems, languages, and interfaces. This fragmentation creates confusion, wastes time,
          costs money in travel, and digitally excludes citizens who are not comfortable with
          English or unreliable internet.
        </p>
      </div>

      <div className="pub-grid-3" style={{ marginBottom: 16 }}>
        {problems.map(([t,b,src,url],i)=>(
          <div key={i} className="pub-card tight">
            <span className="label">Problem {i+1}</span>
            <h4>{t}</h4>
            <p style={{ fontSize: 12.5, lineHeight: 1.4 }}>{b}</p>
            {src && (
              <div className="pub-source">
                Source: {url
                  ? <a href={url} target="_blank" rel="noopener" style={{ color:'#d97706', textDecoration:'underline' }}>{src}</a>
                  : src}
              </div>
            )}
          </div>
        ))}
      </div>

      <span className="pub-overline" style={{ display:'block', marginBottom: 8, color:'#c43a48' }}>The cost of the problem · 3 real scenarios</span>
      <div className="pub-grid-3">
        <div className="pub-cost">
          <div className="who">Sampath · 56 · Maharagama</div>
          <div className="what">"Lost a full working day for one signature — the 'Go to Room 4, then Room 10' problem."</div>
        </div>
        <div className="pub-cost">
          <div className="who">Anjali · 29 · Colombo 7</div>
          <div className="what">"Rs. 15,000 payment gateway timed out. No confirmation. Didn't know if money was taken."</div>
        </div>
        <div className="pub-cost">
          <div className="who">Bandara · 41 · Anuradhapura</div>
          <div className="what">"Travelled 12km by bus to find the officer was in a meeting. Wasted an entire day's income."</div>
        </div>
      </div>
    </PubFinalPage>
  );
}

// ═══════════════════════════════════════════════════════════════
// PAGE 03 — User Research
// ═══════════════════════════════════════════════════════════════
function P_Research() {
  const insights = [
    ['1','Time and travel cost is the biggest pain','Rural citizens lose an entire working day per government interaction. Bus fare is wasted when the trip fails.'],
    ['2','Status anxiety is universal','All 3 participants wanted to know what was happening with their application without calling anyone.'],
    ['3','Half-digital is worse than fully manual','Starting online then being told to visit an office anyway wastes time both digitally and physically.'],
    ['4','Language barriers exclude the most vulnerable','English-only sites aren\'t a preference issue — they\'re a barrier to accessing legal rights and welfare.'],
    ['5','Trust comes from tangibility','"If I have a paper receipt in my hand, I feel safe." Digital must replicate the feeling of physical proof.'],
    ['6','Connectivity is unreliable outside Colombo','Mobile data is unstable in rural areas. Heavy pages don\'t load. 3G is the real constraint.'],
  ];
  return (
    <PubFinalPage title="User Research" subtitle="In-depth qualitative interviews · 3 participants · 15 min each" page={3} total={TOTAL}>
      <div style={{ marginBottom: 14, padding: 12, background:'#fff8ed', borderLeft:'3px solid #d97706', borderRadius: 4 }}>
        <span style={{ fontFamily:'JetBrains Mono', fontSize: 10, color:'#d97706', textTransform:'uppercase', letterSpacing:'0.06em', display:'block', marginBottom: 4 }}>Why qualitative?</span>
        <p style={{ fontFamily:'Caveat', fontSize: 17, fontStyle:'italic', color:'#1a1815', lineHeight: 1.35, margin: 0 }}>
          The depth of pain — not the breadth of it — was the missing layer. Existing reports already tell us <i>that</i> services are fragmented.
          What they don't tell us is what it <i>feels</i> like.
        </p>
      </div>

      <div className="pub-2col">
        <div className="col-main">
          <div className="pub-card outline" style={{ marginBottom: 12 }}>
            <span className="label">Method</span>
            <h4 style={{ marginBottom: 6 }}>In-depth qualitative interviews</h4>
            <p>
              <b>Participants:</b> 3 people · 15 minutes each<br/>
              <b>Selection criteria:</b> different demographics, locations, digital literacy levels<br/>
              <b>Setting:</b> in-person · semi-structured · open-ended follow-ups
            </p>
          </div>

          <div className="pub-card" style={{ marginBottom: 12 }}>
            <span className="label">5 interview questions</span>
            <ol style={{ fontFamily:'Kalam', fontSize: 13, lineHeight: 1.55, margin: 0, paddingLeft: 18 }}>
              <li>When was the last time you dealt with a government service?</li>
              <li>Walk me through what you did — how did you find out what to do?</li>
              <li>What was the most frustrating part?</li>
              <li>Have you ever tried to do it online? What happened?</li>
              <li>If there was a single app, what would you want first?</li>
            </ol>
          </div>

          <span className="pub-overline">6 research insights</span>
          <div className="pub-grid-2">
            {insights.map(([n,t,b])=>(
              <div key={n} className="pub-sticky">
                <span className="num">INSIGHT {n}</span>
                <b>{t}</b>
                <span>{b}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="col-side">
          <div className="pub-figjam">
            <div className="head">
              <span className="dot" /><span className="dot" style={{ background:'#1e9459' }} /><span className="dot" style={{ background:'#c43a48' }} />
              <span className="title">FigJam · Research synthesis board</span>
            </div>
            <div className="notes">
              {Array.from({length: 24}).map((_,i)=>(
                <div key={i} className="note">
                  {[
                    'Lost day · GN office',
                    'Paper receipt = trust',
                    'NIC entered 50x',
                    'Sinhala-only please',
                    'Heavy site = no load',
                    'Status check pls',
                    'Bus fare wasted',
                    'Govpay = where?',
                    'Room 4 → Room 10',
                    'OTP slow',
                    'Officer absent',
                    'No SMS reply',
                    'Receipt lost',
                    'WhatsApp confident',
                    '3G fails',
                    'Aswesuma date?',
                    'Wife handles app',
                    'Renew late = fine',
                    'Bus 12km',
                    'Don\'t know rules',
                    'Brother helps',
                    'Photo not clear',
                    'No biometric trust',
                    'Save the receipt'
                  ][i]}
                </div>
              ))}
            </div>
            <Mono tiny style={{ display:'block', marginTop: 8, color:'#4a4640' }}>
              24 sticky notes · clustered into 6 insights · 3 personas
            </Mono>
          </div>
        </div>
      </div>
    </PubFinalPage>
  );
}

// ═══════════════════════════════════════════════════════════════
// PAGE 06 — Solution
// ═══════════════════════════════════════════════════════════════
function P_Solution() {
  return (
    <PubFinalPage title="The proposed solution" subtitle="Lanka Seva · ලංකා සේවා · Your government. One app." page={6} total={TOTAL}>
      <div className="pub-grid-2" style={{ marginBottom: 14, gap: 14 }}>
        <div className="pub-card amber">
          <span className="label">What Lanka Seva is</span>
          <p style={{ fontSize: 14.5 }}>
            A unified government mobile app for Sri Lanka that consolidates all citizen-facing
            services into a single trusted multilingual platform — organised by what citizens
            need to do (<b>task-first</b>), not which department to visit (<b>institution-first</b>).
          </p>
        </div>
        <div className="pub-card outline">
          <span className="label">Inspiration &amp; reference</span>
          <p style={{ fontSize: 13.5, lineHeight: 1.45 }}>
            Based on the <a href="https://www.icta.lk/projects/digital-government/government-super-app" target="_blank" rel="noopener" style={{ color:'#2B5FA8', textDecoration:'underline', textUnderlineOffset:'2px' }}>publicly documented Sri Lanka Government Super App initiative</a> (Ministry of Digital Economy + ICTA, 2025). Reference model: India's <b>UMANG app</b> (2,500+ services).
            Lanka Seva improves on UMANG's 3 key failures:
          </p>
          <ol style={{ fontFamily:'Kalam', fontSize: 13, lineHeight: 1.5, margin: '6px 0 0', paddingLeft: 18 }}>
            <li>No broken redirects — full flows stay inside the app</li>
            <li>Offline mode — core features work without internet</li>
            <li>Better error handling — every payment state is designed</li>
          </ol>
        </div>
      </div>

      <span className="pub-overline">8 design principles · each addressing a real persona need</span>
      <PubPrinciples />
    </PubFinalPage>
  );
}

// ═══════════════════════════════════════════════════════════════
// PAGE 07 — App Structure
// ═══════════════════════════════════════════════════════════════
function P_Structure() {
  return (
    <PubFinalPage title="App structure" subtitle="Complete navigation map · five tabs · supporting screens · family system" page={7} total={TOTAL}>
      <div className="pub-2col" style={{ gridTemplateColumns:'1.7fr 1fr' }}>
        <div className="col-main">
          <PubFinalSitemap />
          <div className="pub-sitemap-note">
            "The app structure evolved significantly during the research and design process.
            Key decisions: QR Pay as a dedicated centre tab, Profile replacing the original
            My Space concept, and the Family &amp; Children system added after identifying the
            under-18 access gap."
          </div>
        </div>
        <div className="col-side">
          <div className="pub-card amber tight" style={{ marginBottom: 12 }}>
            <span className="label">Family &amp; Children system</span>
            <p style={{ fontSize: 12.5 }}>
              Login: Under-18 detected → family sign-in → parent approval<br/>
              Add child: birth cert → verification → profile setup<br/>
              Child home (restricted) · Child services · Child health card<br/>
              Age 16 transition · Age 18 transition · Guardian approval system
            </p>
          </div>
          <div className="pub-card outline tight">
            <span className="label">EDL note</span>
            <p style={{ fontSize: 12.5 }}>
              Electricity Distribution Lanka (EDL) replaced Ceylon Electricity Board on
              <b> 9 March 2026</b> — all electricity screens reflect the new entity.
            </p>
          </div>
        </div>
      </div>
    </PubFinalPage>
  );
}

// ═══════════════════════════════════════════════════════════════
// PAGE 09 — Journeys: Bandara & Anjali
// ═══════════════════════════════════════════════════════════════
function P_Journey23() {
  return (
    <PubFinalPage title="User journeys · Bandara &amp; Anjali"
      subtitle="Family health appointment · bill payment with anomaly detection"
      page={9} total={TOTAL}>
      <div style={{ display:'flex', flexDirection:'column', gap: 18 }}>
        <PubJourney
          title="Bandara books Kavindu's health appointment"
          arc={['Surprised','Informed','Impressed','In control','Organised']}
          stages={[
            { stage:'1 · Trigger', action:'Notification "MMR booster due for Kavindu · July 2026 · Book now"', emotion:'Surprised — didn\'t know this was possible', pain:'Didn\'t realise app tracks immunisations', opp:'Proactive health reminder builds trust and habit' },
            { stage:'2 · Review', action:'Taps notification · opens Kavindu\'s health card · sees history · 8 of 9 complete', emotion:'Informed, reassured', pain:'Worried about travelling to hospital unnecessarily', opp:'Officer availability equivalent — show clinic availability before visiting' },
            { stage:'3 · Booking', action:'Type pre-filled from health card · hospital pre-filled from MOH area · picks date and time', emotion:'Impressed — "it already knows what he needs"', pain:'Doesn\'t know which hospital to choose', opp:'Pre-filled from child profile removes all decision friction' },
            { stage:'4 · Approval', action:'Booking request sent to Bandara (parent) · approves · appointment confirmed', emotion:'In control, trusted as parent', pain:'10-minute approval window feels pressured', opp:'"Auto-approve health appointments" toggle removes friction for trusted recurring actions' },
            { stage:'5 · Confirmation', action:'Confirmed · added to calendar · parent notification · reminder 1 day before', emotion:'Organised, competent', pain:'May forget appointment without reminder', opp:'Dual reminders (parent + child device) with hospital address + clinic name' },
          ]} />
        <PubJourney
          title="Anjali pays electricity bill with anomaly detection"
          arc={['Concerned','Informed','In control','Curious','Satisfied']}
          stages={[
            { stage:'1 · Notification', action:'"EDL bill due in 3 days · Rs. 3,450 · ⚠ 38% higher than usual"', emotion:'Concerned — higher than expected', pain:'Doesn\'t know why bill is higher', opp:'Usage anomaly alert explains causes (AC, heater, lights left on)' },
            { stage:'2 · Review', action:'Opens bill · breakdown + 6-month chart with average line · current month highlighted', emotion:'Informed — understands why it\'s higher', pain:'Worried about forgetting to pay before due date', opp:'Visual chart comparison makes anomaly obvious — no calculation needed' },
            { stage:'3 · Payment decision', action:'Sees Pay now + Schedule · decides to schedule for payday (25 May)', emotion:'In control — payment on her terms', pain:'Unsure if scheduled payment will go through', opp:'"Will auto-pay on selected date" confirmation with exact amount + bank shown' },
            { stage:'4 · Auto-pay prompt', action:'After confirming · sees "Switch to auto-pay? Save 2 taps next month"', emotion:'Curious — considers setting up recurring', pain:'Worried about auto-pay taking wrong amount', opp:'"Auto-pay uses the exact bill amount each month — never more" reassurance' },
            { stage:'5 · Confirmation', action:'Scheduled · receipt saved · next bill estimate "~14 Jun 2026"', emotion:'Satisfied — done in under 2 minutes', pain:'Wants to know when EDL confirms', opp:'"EDL updates within 1–2 working days — you\'ll be notified when confirmed"' },
          ]} />
      </div>
    </PubFinalPage>
  );
}

function P_Services1() {
  return (
